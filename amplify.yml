version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Skip npm ci entirely when package-lock.json hasn't changed since the
        # last cached build.  On a cache hit this saves ~90s per deployment.
        - |
          LOCK_HASH=$(md5sum package-lock.json | cut -d' ' -f1)
          STAMP=node_modules/.amplify-lock-hash
          if [ -f "$STAMP" ] && [ "$(cat $STAMP)" = "$LOCK_HASH" ]; then
            echo "node_modules cache is current — skipping npm ci"
          else
            echo "Lock file changed or no cache — running npm ci"
            npm ci
            echo "$LOCK_HASH" > "$STAMP"
          fi
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      # Cache node_modules so the hash-check above can skip npm ci on most builds.
      # Also keep ~/.npm so npm ci is fast on the rare builds that do need it.
      - node_modules/**/*
      - ~/.npm/**/*
