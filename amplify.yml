version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
    postBuild:
      commands:
        # Configure SPA redirect so all routes (e.g. /login, /dashboard) serve
        # index.html instead of returning 404 from Amplify's CDN.
        - >
          aws amplify update-app
          --app-id $AWS_APP_ID
          --custom-rules
          '[{"source":"</^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json)$)([^.]+$)/>","target":"/index.html","status":"200"},{"source":"/<*>","target":"/index.html","status":"404-200"}]'
          || echo "Warning: Could not update redirect rules via CLI (check build role permissions)"
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      # Cache npm's tarball store — npm ci uses this to reinstall
      # without re-downloading from the registry (saves ~90s per build).
      # Do NOT cache node_modules itself; npm ci always deletes it.
      - ~/.npm/**/*
