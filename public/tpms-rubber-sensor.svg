<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Rubber TPMS Sensor - Black rubber tire valve stem with metallic core -->
  
  <!-- Main valve stem body (black rubber) -->
  <rect x="14" y="4" width="4" height="20" rx="2" fill="#000000" stroke="#000000" stroke-width="1"/>
  
  <!-- Valve cap (brass) -->
  <rect x="13" y="2" width="6" height="4" rx="2" fill="#CD7F32" stroke="#B8860B" stroke-width="1"/>
  
  <!-- Rubber base seal (darker black) -->
  <rect x="12" y="22" width="8" height="3" rx="1.5" fill="#000000" stroke="#000000" stroke-width="1"/>
  
  <!-- Sensor indicator light -->
  <circle cx="16" cy="15" r="1.5" fill="#4CAF50"/>
</svg> 